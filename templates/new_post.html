{% extends "base.html" %}

{% block title %}Add Post{% endblock %}

{% block content %}
<h1>Add Post for {{ user.first_name }} {{ user.last_name }}</h1>

<form method="POST">
  <p>
    <label>Title</label>
    <input name="title">
  </p>

  <p>
    <label>Content</label>
    <textarea name="content"></textarea>
  </p>

  <h3>Tags</h3>

  {% for tag in tags %}
    <div>
      <input
        type="checkbox"
        name="tags"
        value="{{ tag.id }}"
        id="tag{{ tag.id }}"
      >
      <label for="tag{{ tag.id }}">{{ tag.name }}</label>
    </div>
  {% endfor %}

  <button>Add Post</button>
  <a href="/users/{{ user.id }}">Cancel</a>
</form>
{% endblock %}
